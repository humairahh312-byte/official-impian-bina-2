name: Deploy TanStack Start to Cloudflare

on:
  push:
    branches:
      - main # Enforces deployment only when code enters the main branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Ensure this matches your local development version
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci # Critical: enforces strict adherence to package-lock.json

      - name: Build Project
        run: npm run build

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}